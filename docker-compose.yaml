services:
  opsengine-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: opsengine_dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
