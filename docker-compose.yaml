services:
  opsengine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opsengine_app
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - PORT=5173
      - HOST=0.0.0.0
      - ORIGIN=https://opsengine.tech2work.tech
